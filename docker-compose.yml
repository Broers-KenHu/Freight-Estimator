services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: CourieDelivery
      POSTGRES_USER: couriedelivery
      POSTGRES_PASSWORD: couriedelivery
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U couriedelivery -d CourieDelivery"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8010"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DJANGO_SECRET_KEY: docker-local-dev-secret
      DJANGO_DEBUG: "True"
      AUTH_ALLOW_DEV_USER: "True"
      DATABASE_URL: postgres://couriedelivery:couriedelivery@postgres:5432/CourieDelivery
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,backend
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MSAL_TENANT_ID: ""
      MSAL_AUDIENCE: ""
      MSAL_AUDIENCES: ""
      MSAL_ALLOW_UNVERIFIED_DEV_TOKENS: "False"
    ports:
      - "8010:8010"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8010/api
      VITE_MSAL_CLIENT_ID: ""
      VITE_MSAL_TENANT_ID: ""
      VITE_MSAL_SCOPE: ""
      VITE_MSAL_REDIRECT_URI: http://127.0.0.1:5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  backend_media:
  frontend_node_modules:
